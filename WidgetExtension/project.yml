name: UsagerWidgetExtension
options:
  deploymentTarget:
    macOS: "14.0"
packages:
  Usager:
    path: ..
targets:
  UsagerWidgetExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources/UsagerWidget
    dependencies:
      - package: Usager
        product: UsagerCore
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Usager
        CFBundleName: UsagerWidget
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UsagerTeamID: "$(USAGER_TEAM_ID)"
        LSMinimumSystemVersion: "14.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: true
        CODE_SIGNING_ALLOWED: false
        ENABLE_DEBUG_DYLIB: false
        ENABLE_APP_SANDBOX: true
        INFOPLIST_KEY_UsagerTeamID: "$(USAGER_TEAM_ID)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: "$(USAGER_WIDGET_BUNDLE_ID)"
        PRODUCT_NAME: UsagerWidget
        SWIFT_VERSION: "6.0"
